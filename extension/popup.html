<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HearthHall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 13px;
      background: linear-gradient(160deg, #f9f7f2 0%, #ede8de 100%);
      color: #3d4f3f;
      width: 280px;
      min-height: 200px;
      padding: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .logo svg { width: 28px; height: 28px; flex-shrink: 0; }
    .logo-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 600;
      color: #1b2a1e;
      letter-spacing: 0.02em;
    }

    .card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(27,42,30,0.07);
    }

    .subtitle {
      color: #3d4f3f;
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 14px;
      opacity: 0.7;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #3d4f3f;
      opacity: 0.6;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      display: block;
      width: 100%;
      padding: 8px 11px;
      border: 1px solid #d4cfc4;
      border-radius: 10px;
      background: rgba(255,255,255,0.75);
      color: #1b2a1e;
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: #c2a76d;
      box-shadow: 0 0 0 3px rgba(194,167,109,0.2);
    }
    input::placeholder { color: #3d4f3f; opacity: 0.35; }

    button {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: default; }

    .btn-primary {
      background: #1b2a1e;
      color: #f9f7f2;
      box-shadow: 0 2px 8px rgba(27,42,30,0.25);
    }
    .btn-primary:not(:disabled):hover { background: #3d4f3f; }

    .btn-ghost {
      background: rgba(255,255,255,0.5);
      border: 1px solid #d4cfc4;
      color: #3d4f3f;
      margin-top: 8px;
    }
    .btn-ghost:not(:disabled):hover { background: #e8e4da; }

    .error { color: #b91c1c; font-size: 11px; margin-top: 8px; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .status-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 500;
      color: #1b2a1e;
      font-size: 13px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #16a34a;
      box-shadow: 0 0 6px rgba(22,163,74,0.5);
    }
    .email { font-size: 11px; color: #3d4f3f; opacity: 0.55; margin-top: 4px; }

    #login-view, #status-view { display: none; }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none">
      <path d="M16 3C16 3 7 10.5 7 18a9 9 0 0 0 18 0C25 10.5 16 3 16 3Z" fill="#1b2a1e"/>
      <path d="M16 11c0 0-4.5 4-4.5 7.5a4.5 4.5 0 0 0 9 0C20.5 15 16 11 16 11Z" fill="#c2a76d"/>
      <path d="M16 17c0 0-2 1.75-2 3.25a2 2 0 0 0 4 0C18 18.75 16 17 16 17Z" fill="#f9f7f2"/>
    </svg>
    <span class="logo-name">HearthHall</span>
  </div>

  <div class="card">
    <div id="login-view">
      <p class="subtitle">Sign in to start tracking your browser activity.</p>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      <button id="signin-btn" class="btn-primary">Connect to HearthHall</button>
      <div id="error" class="error" style="display:none"></div>
    </div>

    <div id="status-view">
      <div class="status-row">
        <span class="status-label"><span class="dot"></span>Tracking active</span>
      </div>
      <p class="email" id="user-email"></p>
      <button id="signout-btn" class="btn-ghost">Disconnect</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
