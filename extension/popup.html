<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tandem</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f172a;
      color: #e2e8f0;
      width: 260px;
      padding: 16px;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .subtitle { color: #64748b; font-size: 11px; margin-bottom: 14px; line-height: 1.4; }
    label { display: block; color: #94a3b8; font-size: 11px; margin-bottom: 4px; }
    input {
      display: block;
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:disabled { opacity: .5; cursor: default; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #818cf8; }
    .btn-ghost { background: #1e293b; color: #94a3b8; margin-top: 8px; }
    .btn-ghost:not(:disabled):hover { color: #e2e8f0; }
    .error { color: #f87171; font-size: 11px; margin-top: 8px; }
    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      vertical-align: middle;
    }
    .connected-row { display: flex; align-items: center; justify-content: space-between; }
    .email { font-size: 12px; color: #94a3b8; }
    #login-view, #status-view { display: none; }
  </style>
</head>
<body>
  <h1>Tandem</h1>

  <div id="login-view">
    <p class="subtitle">Sign in with your Tandem account to start tracking activity.</p>
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
    <button id="signin-btn" class="btn-primary">Connect to Tandem</button>
    <div id="error" class="error" style="display:none"></div>
  </div>

  <div id="status-view">
    <div class="connected-row">
      <span><span class="status-dot"></span>Tracking active</span>
    </div>
    <p class="email" id="user-email" style="margin-top:6px"></p>
    <button id="signout-btn" class="btn-ghost">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
